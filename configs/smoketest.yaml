# Smoketest Metadata
exp_dir: "./experiments_smoketest/"
resume: false

# Environment Parameters
env:
  name: "walker"
  task: "walk"
  action_repeat: 2
  action_dim: 6
  height: 64
  width: 64

# Model Architecture
model:
  hidden_dim: 32
  z_dim: 8
  num_ffn_layers: 2
  discount_factor: 0.99

# Training Hyperparameters
train:
  batch_size: 4
  seq_length: 10
  imagination_horizon: 5
  dynamics_model_lr: 0.001
  action_model_lr: 0.001
  value_model_lr: 0.001
  beta: 1.0
  gamma: 0.99
  lambda_: 0.95
  max_steps: 2
  collect_interval: 2
  num_seed_episodes: 2
  exploration_noise_scale: 0.3
  checkpoint_save_interval: 1
  free_nats: 3.0
  viz_interval: 1

# Compute
device: "cpu" # Force CPU for smoketest to avoid CUDA init overhead if unnecessary
